name: Nightly Scrape

on:
  schedule:
    - cron: '0 6 * * *'   # 2:00 AM EDT (6:00 UTC)
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install
        working-directory: scraper

      - name: Run scraper
        run: node scraper.js
        working-directory: scraper

      - name: Copy events.json to docs
        run: cp scraper/data/events.json docs/data/events.json

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/events.json
          git diff --staged --quiet || git commit -m "chore: nightly event data update $(date -u +%Y-%m-%d)"
          git push