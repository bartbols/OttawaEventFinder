<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ottawa Events</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f5f4f0;
      --surface: #ffffff;
      --border: #e4e2dc;
      --text: #1a1917;
      --muted: #6b6762;
      --hint: #a09d99;
      --music: #2563eb;
      --theatre: #7c3aed;
      --art: #059669;
      --other: #6b6762;
      --radius: 10px;
    }

    body {
      font-family: "Inter", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
    }

    /* ── Header ── */
    header {
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
      padding: 1.5rem 2rem 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .site-title {
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .site-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 2px;
    }

    .search-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 1rem;
    }

    input[type="date"] { flex-shrink: 0; }
    .search-text-wrap { flex: 1; }

    input[type="date"], input[type="text"] {
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 12px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="date"]:focus, input[type="text"]:focus { border-color: var(--text); }
    input[type="text"] { flex: 1; min-width: 120px; }


    /* ── Category tabs ── */
    .cat-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0;
      border-bottom: 0.5px solid var(--border);
    }

    .cat-tab {
      font-size: 13px;
      font-family: inherit;
      padding: 8px 16px;
      color: var(--muted);
      cursor: pointer;
      border: none;
      background: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -0.5px;
      transition: color 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .cat-tab:hover { color: var(--text); }
    .cat-tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }

    .cat-count {
      font-size: 11px;
      background: var(--bg);
      border-radius: 99px;
      padding: 1px 7px;
      color: var(--muted);
    }
    .cat-tab.active .cat-count { background: var(--text); color: var(--surface); }

    /* ── Main ── */
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.5rem 1.5rem;
    }

    .results-section-title {
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin: 1.25rem 0 0.5rem;
    }
    .results-section-title:first-child { margin-top: 0; }

    /* ── Status ── */
    #status {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* ── Event list ── */
    .event-row {
      display: flex;
      align-items: baseline;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 0.5px solid var(--border);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }
    .event-row:first-child { border-top: 0.5px solid var(--border); }
    .event-row:hover .event-title { color: var(--muted); }

    .event-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 6px;
    }
    .dot-music    { background: var(--music); }
    .dot-theatre  { background: var(--theatre); }
    .dot-art      { background: var(--art); }
    .dot-other    { background: var(--hint); }

    .event-time {
      font-size: 13px;
      color: var(--muted);
      min-width: 46px;
      flex-shrink: 0;
      font-variant-numeric: tabular-nums;
    }

    .event-body { flex: 1; min-width: 0; }

    .event-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.1s;
    }

    .event-venue {
      font-size: 12px;
      color: var(--muted);
      margin-top: 1px;
    }

    .event-arrow {
      font-size: 13px;
      color: var(--hint);
      flex-shrink: 0;
    }

    /* ── Empty / loading ── */
    .empty-state {
      text-align: center;
      padding: 4rem 1rem;
      color: var(--muted);
    }
    .empty-state .icon { font-size: 2rem; margin-bottom: 0.75rem; }
    .empty-state p { font-size: 14px; }

    /* ── Legend ── */
    .legend {
      display: flex;
      gap: 1.25rem;
      padding: 0.75rem 0;
      border-top: 0.5px solid var(--border);
      margin-top: 0.5rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
    }
    .legend-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .shortcut-row {
      display: flex;
      gap: 6px;
      margin-bottom: 0.75rem;
      flex-wrap: wrap;
    }

    .shortcut-btn {
      font-size: 12px;
      font-family: inherit;
      padding: 4px 12px;
      border-radius: 99px;
      border: 0.5px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .shortcut-btn:hover { border-color: var(--text); color: var(--text); }
    .shortcut-btn.active { background: var(--text); color: var(--surface); border-color: var(--text); }

    .search-text-wrap {
      position: relative;
      flex: 1;
      min-width: 120px;
    }
    .search-text-wrap input { width: 100%; padding-right: 28px; }
    .clear-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--hint);
      font-size: 16px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      display: none;
    }
    .clear-btn:hover { color: var(--text); }

    .past-warning {
      font-size: 12px;
      color: var(--hint);
      margin-bottom: 0.5rem;
    }
      text-align: center;
      padding: 2rem;
      font-size: 12px;
      color: var(--hint);
      border-top: 0.5px solid var(--border);
      margin-top: 2rem;
    }

    @media (max-width: 600px) {
      header { padding: 1.25rem 1rem 0; }
      main { padding: 1rem; }
      .search-row { flex-wrap: wrap; }
      input[type="date"] { flex: 1; }
    }

    /* ── Calendar ── */
    .cal-section { padding: 0.75rem 0 0.5rem; border-bottom: 0.5px solid var(--border); }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; padding: 0 1.5rem; }
    .cal-title { font-size: 13px; font-weight: 500; color: var(--text); }
    .cal-nav { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 15px; padding: 2px 8px; border-radius: var(--radius); font-family: inherit; }
    .cal-nav:hover { color: var(--text); background: var(--surface); }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; padding: 0 1.5rem; }
    .cal-dow { text-align: center; font-size: 11px; color: var(--muted); padding: 2px 0 4px; }
    .cal-day { border-radius: 6px; padding: 3px 2px; text-align: center; cursor: pointer; min-height: 40px; display: flex; flex-direction: column; align-items: center; gap: 2px; border: 0.5px solid transparent; }
    .cal-day:hover:not(.cal-empty) { background: var(--surface); }
    .cal-day.cal-selected { background: var(--surface); border-color: var(--border); }
    .cal-empty { cursor: default; }
    .cal-day-num { font-size: 12px; color: var(--text); width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
    .cal-today-num { background: var(--text) !important; color: var(--bg) !important; }
    .cal-other-month { color: var(--hint) !important; }
    .cal-dots { display: flex; gap: 2px; justify-content: center; min-height: 6px; flex-wrap: wrap; max-width: 22px; }
    .cal-dot { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }
    @media (max-width: 480px) { .cal-grid, .cal-header { padding: 0 0.75rem; } }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <div class="site-title">Ottawa events</div>
      <div class="site-sub">Cultural events from local venues</div>
    </div>
  </div>
  <div class="search-row">
    <input type="date" id="date-input" />
    <div class="search-text-wrap">
      <input type="text" id="text-input" placeholder="Search events…" />
      <button class="clear-btn" id="clear-btn" onclick="clearSearch()" title="Clear search">×</button>
    </div>
  </div>
  <div class="shortcut-row">
    <button class="shortcut-btn" id="btn-today" onclick="setShortcut('today')">Today</button>
    <button class="shortcut-btn" id="btn-tomorrow" onclick="setShortcut('tomorrow')">Tomorrow</button>
    <button class="shortcut-btn" id="btn-weekend" onclick="setShortcut('weekend')">This weekend</button>
  </div>
  <div class="cal-section" id="cal-section">
    <div class="cal-header">
      <button class="cal-nav" onclick="calNav(-1)">&#8592;</button>
      <span class="cal-title" id="cal-title"></span>
      <button class="cal-nav" onclick="calNav(1)">&#8594;</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div class="cat-tabs" id="cat-tabs">
    <button class="cat-tab active" data-cat="all" onclick="setTab(this)">All <span class="cat-count" id="count-all">0</span></button>
    <button class="cat-tab" data-cat="music" onclick="setTab(this)">Music <span class="cat-count" id="count-music">0</span></button>
    <button class="cat-tab" data-cat="theatre" onclick="setTab(this)">Theatre <span class="cat-count" id="count-theatre">0</span></button>
    <button class="cat-tab" data-cat="art" onclick="setTab(this)">Art <span class="cat-count" id="count-art">0</span></button>
    <button class="cat-tab" data-cat="other" onclick="setTab(this)">Other <span class="cat-count" id="count-other">0</span></button>
  </div>
</header>

<main>
  <div id="past-warning" class="past-warning" style="display:none">⚠️ You're viewing a past date.</div>
  <div id="status"></div>
  <div id="events-container">
    <div class="empty-state">
      <div class="icon">🎭</div>
      <p>Select a date or search to discover what's on in Ottawa.</p>
    </div>
  </div>
</main>

<footer>
  Data scraped nightly from Ottawa venue websites.
</footer>

<script>
  const DATA_URL = "./data/events.json";

  const SOURCES = {
    nac:             { name: "National Arts Centre",  url: "https://nac-cna.ca/en/" },
    gallery:         { name: "National Gallery",      url: "https://www.gallery.ca" },
    blues:           { name: "Blues Fest Ottawa",     url: "https://ottawabluesfest.ca" },
    jazz:           { name: "Ottawa Jazz Festival",   url: "https://program.ottawajazzfestival.com/" },
    gigs:            { name: "Ottawa Gigs",           url: "https://ottawagigs.ca/" },
    redbird:         { name: "Red Bird Live",         url: "https://www.redbirdlive.ca/shows" },
    irenes:          { name: "Irene's Pub",           url: "https://irenespub.ca/events" },
    gladstone:       { name: "The Gladstone",         url: "https://thegladstone.ca/upcoming-shows/" },
    gctc:            { name: "GCTC",                  url: "https://www.gctc.ca/buy-tickets" },
    blacksheep:      { name: "Black Sheep Inn",       url: "https://www.theblacksheep.ca/shows" },
    ottawapops:      { name: "Ottawa Pops Orchestra", url: "https://www.ottawapopsorchestra.ca/events" },
    orkidstra:       { name: "Orkidstra",             url: "https://orkidstra.ca/events" },
    thirteenstrings: { name: "Thirteen Strings",      url: "https://thirteenstrings.ca/events" },
    manual:          { name: "Community",             url: "#" },
    bronson:         { name: "The Bronson",           url: "https://bronsoncentremusictheatre.com/events/" },
    chamberfest:     { name: "Chamberfest",            url: "https://www.chamberfest.com/events/" },
    cityfolk:        { name: "CityFolk Festival",       url: "https://cityfolkfestival.com/schedule/" },
    motelchelsea:    { name: "Motel Chelsea",            url: "https://www.motelchelsea.com/love-live" },
  };

  // ── Category classification ──────────────────────────────────────────
  const SOURCE_CAT = {
    irenes: "music", redbird: "music", blues: "music", jazz: "music",
    gigs: "music", ottawapops: "music", thirteenstrings: "music", orkidstra: "music",
    gladstone: "theatre", gctc: "theatre",
    gallery: "art",
    nac: null, blacksheep: "music", manual: null, bronson: "music", chamberfest: "music", cityfolk: "music", motelchelsea: "music",
  };

  const MUSIC_WORDS   = /\b(concert|jazz|blues|folk|rock|band|music|orchestra|symphony|choir|sing|song|perform|duo|trio|quartet|quintet|festival|fest|open\s*mic|acoustic|set|gig|show|tour|album|vinyl|dj|live)\b/i;
  const THEATRE_WORDS = /\b(play|theatre|theater|show|comedy|improv|stand.?up|cabaret|musical|drama|monologue|storytell|reading|spoken\s*word|burlesque|magic|circus|dance|ballet|opera|puppet)\b/i;
  const ART_WORDS     = /\b(exhibit|gallery|art|paint|sculpt|photo|film|screen|cinema|movie|lecture|talk|panel|workshop|install|visual|curate|opening|vernissage)\b/i;

  function classify(ev) {
    if (ev.category) return ev.category;
    const base = SOURCE_CAT[ev.source];
    if (base) return base;
    const text = (ev.title + " " + (ev.description || "")).toLowerCase();
    if (MUSIC_WORDS.test(text))   return "music";
    if (THEATRE_WORDS.test(text)) return "theatre";
    if (ART_WORDS.test(text))     return "art";
    return "other";
  }

  // ── State ────────────────────────────────────────────────────────────
  let allEvents = [];
  let activeTab = "all";
  let searchQuery = "";

  function setTab(btn) {
    document.querySelectorAll(".cat-tab").forEach(t => t.classList.remove("active"));
    btn.classList.add("active");
    activeTab = btn.dataset.cat;
    renderList();
  }

  function updateCounts(events) {
    const counts = { all: events.length, music: 0, theatre: 0, art: 0, other: 0 };
    events.forEach(e => counts[e._cat] = (counts[e._cat] || 0) + 1);
    Object.keys(counts).forEach(k => {
      const el = document.getElementById("count-" + k);
      if (el) el.textContent = counts[k];
    });
  }

  function fmtTime(t) {
    if (!t) return "";
    const parts = t.split(":");
    const h = parseInt(parts[0], 10);
    const m = parseInt(parts[1], 10) || 0;
    if (isNaN(h)) return "";
    const suffix = h >= 12 ? "pm" : "am";
    const hour = h % 12 || 12;
    return m === 0 ? `${hour}${suffix}` : `${hour}:${String(m).padStart(2,"0")}${suffix}`;
  }

  function renderList() {
    const c = document.getElementById("events-container");
    let filtered = activeTab === "all" ? allEvents : allEvents.filter(e => e._cat === activeTab);

    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(e =>
        (e.title || "").toLowerCase().includes(q) ||
        (e.venue || "").toLowerCase().includes(q) ||
        (e.description || "").toLowerCase().includes(q)
      );
    }

    if (!filtered.length) {
      c.innerHTML = `<div class="empty-state"><p>No ${activeTab === "all" ? "" : activeTab + " "}events found.</p></div>`;
      return;
    }

    // If text search active and date selected, split into "on this date" and "other dates"
    const dateVal = document.getElementById("date-input").value;
    let onDate = filtered;
    let otherDates = [];

    if (searchQuery && dateVal) {
      onDate = filtered.filter(e => e.date === dateVal);
      otherDates = filtered.filter(e => e.date !== dateVal);
      // Sort other dates by date ascending
      otherDates.sort((a, b) => (a.date || "").localeCompare(b.date || ""));
    }

    const renderRows = (events) => {
      // Sort: timed events first, then by time, then untimed alphabetically
      events.sort((a, b) => {
        if (a.time && b.time) return a.time.localeCompare(b.time);
        if (a.time) return -1;
        if (b.time) return 1;
        return (a.title || "").localeCompare(b.title || "");
      });

      const dotClass = { music: "dot-music", theatre: "dot-theatre", art: "dot-art", other: "dot-other" };
      return events.map(ev => {
        const src = SOURCES[ev.source] || { name: ev.source, url: "#" };
        const dot = dotClass[ev._cat] || "dot-other";
        const time = fmtTime(ev.time);
        const url = ev.url || src.url;
        const primaryName = (ev.source === "manual" && ev.venue && !ev.venue.startsWith("http"))
          ? ev.venue
          : (ev.source === "gigs" && ev.venue && !ev.venue.startsWith("http"))
          ? ev.venue
          : src.name;
        const secondaryVenue = (ev.source !== "manual" && ev.source !== "gigs" && ev.venue && ev.venue !== src.name && !ev.venue.startsWith("http"))
          ? " · " + esc(ev.venue) : "";
        // For other-dates section, show the date instead of time
        const timeDisplay = otherDates.includes(ev)
          ? new Date(ev.date + "T12:00:00").toLocaleDateString("en-CA", { month: "short", day: "numeric" })
          : time;
        return `<a class="event-row" href="${esc(url)}" target="_blank" rel="noopener">
          <div class="event-dot ${dot}"></div>
          <div class="event-time">${esc(timeDisplay)}</div>
          <div class="event-body">
            <div class="event-title">${esc(ev.title)}</div>
            <div class="event-venue">${esc(primaryName)}${secondaryVenue}</div>
          </div>
          <div class="event-arrow">↗</div>
        </a>`;
      }).join("");
    };

    let html = "";
    if (searchQuery && dateVal && (onDate.length || otherDates.length)) {
      if (onDate.length) {
        html += `<div class="results-section-title">On this date</div>` + renderRows(onDate);
      }
      if (otherDates.length) {
        html += `<div class="results-section-title" style="margin-top:1.5rem">Other dates</div>` + renderRows(otherDates);
      }
    } else {
      html = renderRows(filtered);
    }

    c.innerHTML = html + `<div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--music)"></div>Music</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--theatre)"></div>Theatre</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--art)"></div>Art</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--hint)"></div>Other</div>
    </div>`;
  }


  function esc(s) {
    return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  async function searchEvents() {
    const dateVal = document.getElementById("date-input").value;
    const textVal = document.getElementById("text-input").value.trim();
    searchQuery = textVal;

    if (!dateVal && !textVal) return;


    try {
      const resp = await fetch(DATA_URL);
      if (!resp.ok) throw new Error("Could not load events.json");
      const data = await resp.json();

      allEvents = (data.events || [])
        .filter(e => !dateVal || !searchQuery || e.date === dateVal ? true : true) // load all when text searching
        .map(e => ({ ...e, _cat: classify(e) }));

      // When text searching, load everything; date filter applied in renderList
      if (searchQuery) {
        allEvents = (data.events || []).map(e => ({ ...e, _cat: classify(e) }));
      } else {
        allEvents = (data.events || []).filter(e => !dateVal || e.date === dateVal).map(e => ({ ...e, _cat: classify(e) }));
      }

      // Apply text filter for counts and status
      const textFiltered = searchQuery
        ? allEvents.filter(e =>
            (e.title || "").toLowerCase().includes(searchQuery.toLowerCase()) ||
            (e.venue || "").toLowerCase().includes(searchQuery.toLowerCase()) ||
            (e.description || "").toLowerCase().includes(searchQuery.toLowerCase()))
        : allEvents;

      updateCounts(textFiltered);
      renderList();

      const scrapedMsg = data.scrapedAt
        ? " · updated " + new Date(data.scrapedAt).toLocaleDateString("en-CA")
        : "";

      const onDateCount = dateVal ? textFiltered.filter(e => e.date === dateVal).length : 0;
      const otherCount  = dateVal ? textFiltered.filter(e => e.date !== dateVal).length : textFiltered.length;
      const count = textFiltered.length;

      let statusMsg = "";
      if (count === 0) {
        statusMsg = `No events found${searchQuery ? ` matching "${searchQuery}"` : ""}`;
      } else if (searchQuery && dateVal) {
        const dateLabel = new Date(dateVal + "T12:00:00").toLocaleDateString("en-CA", { weekday: "long", month: "long", day: "numeric" });
        const parts = [];
        if (onDateCount) parts.push(`${onDateCount} on ${dateLabel}`);
        if (otherCount)  parts.push(`${otherCount} on other dates`);
        statusMsg = `"${searchQuery}": ${parts.join(", ")}${scrapedMsg}`;
      } else if (searchQuery) {
        statusMsg = `${count} event${count !== 1 ? "s" : ""} matching "${searchQuery}"${scrapedMsg}`;
      } else {
        const dateLabel = dateVal
          ? new Date(dateVal + "T12:00:00").toLocaleDateString("en-CA", { weekday: "long", year: "numeric", month: "long", day: "numeric" })
          : "all dates";
        statusMsg = `${count} event${count !== 1 ? "s" : ""} on ${dateLabel}${scrapedMsg}`;
      }

      document.getElementById("status").textContent = statusMsg;

    } catch(err) {
      document.getElementById("status").textContent = "⚠️ " + err.message;
    } finally {
    }
  }

  // ── Calendar ──────────────────────────────────────────────────────────
  let calYear = new Date().getFullYear();
  let calMonth = new Date().getMonth();
  let calEventMap = {}; // "YYYY-MM-DD" -> [{cat}]

  const DOW = ["Su","Mo","Tu","We","Th","Fr","Sa"];
  const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

  function buildCalendar() {
    const title = document.getElementById("cal-title");
    const grid = document.getElementById("cal-grid");
    title.textContent = `${MONTHS[calMonth]} ${calYear}`;

    const today = new Date().toISOString().split("T")[0];
    const selectedDate = document.getElementById("date-input").value;

    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
    const daysInPrev = new Date(calYear, calMonth, 0).getDate();

    let html = DOW.map(d => `<div class="cal-dow">${d}</div>`).join("");

    // Leading days from prev month
    for (let i = firstDay - 1; i >= 0; i--) {
      const day = daysInPrev - i;
      const prevMonth = calMonth === 0 ? 11 : calMonth - 1;
      const prevYear = calMonth === 0 ? calYear - 1 : calYear;
      const ds = `${prevYear}-${String(prevMonth + 1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
      html += `<div class="cal-day cal-empty"><div class="cal-day-num cal-other-month">${day}</div></div>`;
    }

    // Current month days
    for (let d = 1; d <= daysInMonth; d++) {
      const ds = `${calYear}-${String(calMonth + 1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const isToday = ds === today;
      const isSelected = ds === selectedDate;
      const events = calEventMap[ds] || [];
      const dotCats = [...new Set(events.map(e => e.cat))].slice(0, 4);
      const dots = dotCats.map(c => `<div class="cal-dot" style="background:var(--${c})"></div>`).join("");
      html += `<div class="cal-day${isSelected ? " cal-selected" : ""}" onclick="calSelectDay('${ds}')">
        <div class="cal-day-num${isToday ? " cal-today-num" : ""}">${d}</div>
        <div class="cal-dots">${dots}</div>
      </div>`;
    }

    // Trailing days
    const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
    for (let d = 1; d <= totalCells - firstDay - daysInMonth; d++) {
      html += `<div class="cal-day cal-empty"><div class="cal-day-num cal-other-month">${d}</div></div>`;
    }

    grid.innerHTML = html;
  }

  function calNav(dir) {
    calMonth += dir;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    if (calMonth < 0) { calMonth = 11; calYear--; }
    buildCalendar();
  }

  function calSelectDay(ds) {
    document.getElementById("date-input").value = ds;
    document.querySelectorAll(".shortcut-btn").forEach(b => b.classList.remove("active"));
    weekendDates = [];
    checkPastWarning();
    buildCalendar();
    searchEvents();
  }

  function calSyncToDate(ds) {
    if (!ds) return;
    const [y, m] = ds.split("-").map(Number);
    calYear = y; calMonth = m - 1;
    buildCalendar();
  }

  async function loadCalendarData() {
    try {
      const resp = await fetch(DATA_URL);
      if (!resp.ok) return;
      const data = await resp.json();
      calEventMap = {};
      for (const e of (data.events || [])) {
        if (!e.date) continue;
        if (!calEventMap[e.date]) calEventMap[e.date] = [];
        calEventMap[e.date].push({ cat: classify(e) });
      }
      buildCalendar();
    } catch {}
  }

  // ── Shortcut buttons ─────────────────────────────────────────────────
  let weekendDates = [];
  let activeShortcut = "";

  function getDateStr(offset) {
    const d = new Date();
    d.setDate(d.getDate() + offset);
    return d.toISOString().split("T")[0];
  }

  function getWeekendDates() {
    const today = new Date();
    const dow = today.getDay(); // 0=Sun,1=Mon,...,6=Sat
    // Find next Friday (or today if Fri/Sat/Sun)
    const days = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(today);
      d.setDate(today.getDate() + i);
      const wd = d.getDay();
      if (wd === 5 || wd === 6 || wd === 0) days.push(d.toISOString().split("T")[0]);
      if (days.length === 3) break;
    }
    return days;
  }

  function setShortcut(type) {
    activeShortcut = type;
    document.querySelectorAll(".shortcut-btn").forEach(b => b.classList.remove("active"));
    document.getElementById("btn-" + type)?.classList.add("active");

    if (type === "today") {
      weekendDates = [];
      document.getElementById("date-input").value = getDateStr(0);
      searchEvents();
    } else if (type === "tomorrow") {
      weekendDates = [];
      document.getElementById("date-input").value = getDateStr(1);
      searchEvents();
    } else if (type === "weekend") {
      weekendDates = getWeekendDates();
      document.getElementById("date-input").value = weekendDates[0] || getDateStr(0);
      searchWeekend();
    }
  }

  async function searchWeekend() {
    try {
      const resp = await fetch(DATA_URL);
      if (!resp.ok) throw new Error("Could not load events.json");
      const data = await resp.json();
      const dateSet = new Set(weekendDates);
      allEvents = (data.events || [])
        .filter(e => dateSet.has(e.date))
        .map(e => ({ ...e, _cat: classify(e) }));

      updateCounts(allEvents);

      // Group by date for weekend display
      const c = document.getElementById("events-container");
      const dotClass = { music: "dot-music", theatre: "dot-theatre", art: "dot-art", other: "dot-other" };
      let html = "";
      for (const date of weekendDates) {
        const dayEvents = allEvents.filter(e => e.date === date);
        if (!dayEvents.length) continue;
        dayEvents.sort((a, b) => {
          if (a.time && b.time) return a.time.localeCompare(b.time);
          if (a.time) return -1; if (b.time) return 1;
          return (a.title||"").localeCompare(b.title||"");
        });
        const label = new Date(date + "T12:00:00").toLocaleDateString("en-CA", { weekday: "long", month: "long", day: "numeric" });
        html += `<div class="results-section-title">${label}</div>`;
        html += dayEvents.map(ev => {
          const src = SOURCES[ev.source] || { name: ev.source, url: "#" };
          const dot = dotClass[ev._cat] || "dot-other";
          const time = fmtTime(ev.time);
          const url = ev.url || src.url;
          const primaryName = (ev.source === "manual" && ev.venue && !ev.venue.startsWith("http")) ? ev.venue
            : (ev.source === "gigs" && ev.venue && !ev.venue.startsWith("http")) ? ev.venue : src.name;
          const secondaryVenue = (ev.source !== "manual" && ev.source !== "gigs" && ev.venue && ev.venue !== src.name && !ev.venue.startsWith("http")) ? " · " + esc(ev.venue) : "";
          return `<a class="event-row" href="${esc(url)}" target="_blank" rel="noopener">
            <div class="event-dot ${dot}"></div>
            <div class="event-time">${esc(time)}</div>
            <div class="event-body">
              <div class="event-title">${esc(ev.title)}</div>
              <div class="event-venue">${esc(primaryName)}${secondaryVenue}</div>
            </div>
            <div class="event-arrow">↗</div>
          </a>`;
        }).join("");
      }
      if (!html) html = `<div class="empty-state"><p>No events found this weekend.</p></div>`;
      c.innerHTML = html + `<div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--music)"></div>Music</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--theatre)"></div>Theatre</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--art)"></div>Art</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--hint)"></div>Other</div>
      </div>`;

      const total = allEvents.length;
      const scrapedMsg = data.scrapedAt ? " · updated " + new Date(data.scrapedAt).toLocaleDateString("en-CA") : "";
      document.getElementById("status").textContent = `${total} event${total !== 1 ? "s" : ""} this weekend${scrapedMsg}`;
    } catch(err) {
      document.getElementById("status").textContent = "⚠️ " + err.message;
    } finally {
    }
  }

  // ── Past date warning ─────────────────────────────────────────────────
  function checkPastWarning() {
    const dateVal = document.getElementById("date-input").value;
    const today = new Date().toISOString().split("T")[0];
    const warn = document.getElementById("past-warning");
    warn.style.display = (dateVal && dateVal < today) ? "block" : "none";
  }

  document.getElementById("date-input").addEventListener("change", () => {
    activeShortcut = "";
    document.querySelectorAll(".shortcut-btn").forEach(b => b.classList.remove("active"));
    weekendDates = [];
    checkPastWarning();
    calSyncToDate(document.getElementById("date-input").value);
    searchEvents();
  });

  // ── Init: auto-load today ─────────────────────────────────────────────
  function clearSearch() {
    document.getElementById("text-input").value = "";
    document.getElementById("clear-btn").style.display = "none";
    searchQuery = "";
    if (allEvents.length) renderList();
  }

  document.getElementById("date-input").value = new Date().toISOString().split("T")[0];
  document.getElementById("date-input").addEventListener("keydown", e => { if (e.key === "Enter") searchEvents(); });
  document.getElementById("text-input").addEventListener("keydown", e => { if (e.key === "Enter") searchEvents(); });
  document.getElementById("text-input").addEventListener("input", () => {
    searchQuery = document.getElementById("text-input").value.trim();
    document.getElementById("clear-btn").style.display = searchQuery ? "block" : "none";
    if (allEvents.length) renderList();
  });

  // Auto-load today on page open
  loadCalendarData();
  setShortcut("today");
</script>
</body>
</html>
